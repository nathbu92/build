name: Build Windows (Electron)

on:
  push:
    branches: [main, dev]
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build-windows:
    name: Build Windows EXE
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build EXE
        run: npm run build

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: Papillon-Windows-Setup
          path: dist/*.exe
          retention-days: 30

  release:
    name: GitHub Release
    needs: build-windows
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Get version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Papillon ${{ steps.version.outputs.VERSION }} — Windows
          files: artifacts/**/*.exe
          body: |
            ## 🪟 Papillon ${{ steps.version.outputs.VERSION }} pour Windows

            - **Setup.exe** : installateur (recommandé)
            - **portable.exe** : version portable, sans installation

            Windows 10/11 64-bit requis.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
