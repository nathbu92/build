name: Build Windows (Electron)

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build-windows:
    name: Build Windows EXE
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build EXE
        run: npm run build

      - name: Upload Setup artifact
        uses: actions/upload-artifact@v4
        with:
          name: Papillon-Windows-Setup
          path: dist/Papillon Setup*.exe
          retention-days: 30

      - name: Upload Portable artifact
        uses: actions/upload-artifact@v4
        with:
          name: Papillon-Windows-Portable
          path: dist/Papillon-*-portable.exe
          retention-days: 30

  release:
    name: GitHub Release
    needs: build-windows
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Get version
        id: ver
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Papillon ${{ steps.ver.outputs.VERSION }} — Windows
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: artifacts/**/*.exe
          body: |
            ## 🌿 Papillon ${{ steps.ver.outputs.VERSION }} pour Windows

            ### Téléchargement
            - **Papillon Setup.exe** — Installateur recommandé
            - **Papillon-portable.exe** — Version portable, sans installation

            ### Configuration requise
            Windows 10/11 64-bit

            ### Connexion
            Compatible **PRONOTE** via recherche par ville ou géolocalisation.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
